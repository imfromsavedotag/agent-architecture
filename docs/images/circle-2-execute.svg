<svg viewBox="0 0 2400 2400" xmlns="http://www.w3.org/2000/svg">
  <!-- ============================================================
       Circle 2 — EXECUTE
       Article set for Towards Data Science
       Same palette and fonts as Circle 1.
       ============================================================ -->

  <!-- Background -->
  <rect width="2400" height="2400" fill="#F7F2EB"/>

  <!-- Top label -->
  <text x="200" y="180" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="34" fill="#8B8378" letter-spacing="6">CIRCLE 2</text>

  <!-- Outer ring -->
  <circle cx="1200" cy="1170" r="680" fill="none"
          stroke="#2A3441" stroke-width="2.5" opacity="0.85"/>

  <!-- ============= Beat nodes (4 cardinal) ============= -->

  <!-- Beat 1 (top, 90°) — /kickoff-phase — at (1200, 490) -->
  <circle cx="1200" cy="490" r="38" fill="#F7F2EB" stroke="#2A3441" stroke-width="3"/>
  <text x="1200" y="506" font-family="DejaVu Sans, sans-serif" font-size="34"
        font-weight="bold" fill="#2A3441" text-anchor="middle">1</text>

  <!-- Beat 2 (right, 0°) — Human Gate 2 — at (1880, 1170) — ACCENT -->
  <circle cx="1880" cy="1170" r="60" fill="none" stroke="#B85C3E" stroke-width="2" opacity="0.35"/>
  <circle cx="1880" cy="1170" r="38" fill="#B85C3E" stroke="#B85C3E" stroke-width="3"/>
  <text x="1880" y="1186" font-family="DejaVu Sans, sans-serif" font-size="34"
        font-weight="bold" fill="#F7F2EB" text-anchor="middle">2</text>

  <!-- Beat 3 (bottom, -90°) — Implementation — at (1200, 1850) -->
  <circle cx="1200" cy="1850" r="38" fill="#F7F2EB" stroke="#2A3441" stroke-width="3"/>
  <text x="1200" y="1866" font-family="DejaVu Sans, sans-serif" font-size="34"
        font-weight="bold" fill="#2A3441" text-anchor="middle">3</text>

  <!-- Beat 4 (left, 180°) — /complete-phase — at (520, 1170) -->
  <circle cx="520" cy="1170" r="38" fill="#F7F2EB" stroke="#2A3441" stroke-width="3"/>
  <text x="520" y="1186" font-family="DejaVu Sans, sans-serif" font-size="34"
        font-weight="bold" fill="#2A3441" text-anchor="middle">4</text>

  <!-- ============= Beat labels ============= -->

  <!-- Beat 1 (top) — /kickoff-phase -->
  <text x="1200" y="350" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="46" font-weight="bold" fill="#2A3441" text-anchor="middle">/kickoff-phase</text>
  <text x="1200" y="400" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="middle">plan-inspector writes phase-N-kickoff.md</text>
  <text x="1200" y="434" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="middle">— understanding, concerns, clarifications</text>

  <!-- Beat 2 (right) — Human Gate 2 (ACCENT) -->
  <text x="1955" y="1115" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="50" font-weight="bold" fill="#B85C3E" text-anchor="start">Human Gate 2</text>
  <text x="1955" y="1165" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="start">the inspector's read, weighed;</text>
  <text x="1955" y="1199" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="start">clarifications addressed</text>

  <!-- Beat 3 (bottom) — Implementation -->
  <text x="1200" y="1960" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="50" font-weight="bold" fill="#2A3441" text-anchor="middle">Implementation</text>
  <text x="1200" y="2010" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="middle">agent runs in background;</text>
  <text x="1200" y="2044" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="middle">STATE.md checkpoints per subtask</text>

  <!-- Beat 4 (left) — /complete-phase -->
  <text x="465" y="1115" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="46" font-weight="bold" fill="#2A3441" text-anchor="end">/complete-phase</text>
  <text x="465" y="1165" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="end">test-gate → reviewer →</text>
  <text x="465" y="1199" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#5B6470" text-anchor="end">doc-updater ∥ phase-bookkeeper</text>
  <text x="465" y="1233" font-family="DejaVu Sans, sans-serif" font-size="24"
        fill="#8B8378" text-anchor="end" font-style="italic">gates skipped if no code touched</text>

  <!-- ============= Center title + phase strip ============= -->

  <text x="1200" y="1130" font-family="Charter, 'Bitstream Charter', Georgia, serif"
        font-size="130" font-weight="bold" fill="#2A3441" text-anchor="middle"
        letter-spacing="4">Execute</text>

  <!-- Phase strip: small dots connected by lines, last marker is a checkmark -->
  <g transform="translate(1200, 1220)">
    <!-- 4 phase dots + ellipsis + checkmark -->
    <line x1="-260" y1="0" x2="260" y2="0" stroke="#2A3441" stroke-width="2" opacity="0.5"/>
    <circle cx="-220" cy="0" r="14" fill="#2A3441"/>
    <circle cx="-130" cy="0" r="14" fill="#2A3441"/>
    <circle cx="-40" cy="0" r="14" fill="#2A3441"/>
    <text x="50" y="9" font-family="DejaVu Sans, sans-serif" font-size="34"
          fill="#2A3441" text-anchor="middle" font-weight="bold">···</text>
    <circle cx="140" cy="0" r="14" fill="#2A3441"/>
    <!-- Checkmark in a small circle to mark "all complete" -->
    <circle cx="230" cy="0" r="22" fill="none" stroke="#2A3441" stroke-width="2.5"/>
    <path d="M 218 0 L 226 8 L 242 -8" stroke="#2A3441" stroke-width="3"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="1200" y="1310" font-family="DejaVu Sans, sans-serif" font-size="30"
        fill="#8B8378" text-anchor="middle" font-style="italic">one phase, repeated until all complete</text>
  <text x="1200" y="1352" font-family="DejaVu Sans, sans-serif" font-size="24"
        fill="#8B8378" text-anchor="middle">each phase sized to fit one dialog · STATE.md carries context forward</text>

  <!-- ============= Substrate caption ============= -->

  <line x1="500" y1="2160" x2="1900" y2="2160" stroke="#8B8378" stroke-width="1" opacity="0.4"/>

  <text x="1200" y="2230" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#8B8378" text-anchor="middle" font-style="italic">reads</text>
  <text x="1200" y="2270" font-family="DejaVu Sans, sans-serif" font-size="26"
        fill="#8B8378" text-anchor="middle">PLAN.md  ·  STATE.md  ·  phase reading list  ·  CLAUDE.md  ·  doc-mapping.yaml</text>
  <text x="1200" y="2330" font-family="DejaVu Sans, sans-serif" font-size="28"
        fill="#8B8378" text-anchor="middle" font-style="italic">writes</text>
  <text x="1200" y="2370" font-family="DejaVu Sans, sans-serif" font-size="26"
        fill="#8B8378" text-anchor="middle">phase-N-kickoff.md  ·  phase-N-review.md  ·  STATE.md  ·  CHANGELOG.md  ·  files-changed.md</text>
</svg>
